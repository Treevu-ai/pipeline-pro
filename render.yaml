services:
  - type: web
    name: agentepyme-sdr
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # se carga manualmente en el dashboard de Render
      - key: PYTHON_VERSION
        value: 3.11.0
